services:
  - type: web
    name: outreach-sr-sync
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: OUTREACH_CLIENT_ID
        sync: false
      - key: OUTREACH_CLIENT_SECRET
        sync: false
      - key: OUTREACH_REDIRECT_URI
        sync: false
